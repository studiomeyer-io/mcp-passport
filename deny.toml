# cargo-deny configuration — `cargo deny check advisories bans sources licenses`.
# Advisory-strict, a license allowlist that matches the dependency tree, and a sources
# allowlist restricted to crates.io. (Not wired into CI — run it locally before a release.)

[graph]
all-features = true

[output]
feature-depth = 1

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# SPDX allowlist matching the dependency tree (clap / regex / ignore / serde + transitive).
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
]
confidence-threshold = 0.93
exceptions = []
